[workspace]
name = "pypsa-validation-processing"
version = "0.1.0"
description = "Processing pypsa output to IAMC-Variables for validation workflow"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[tasks]
workflow = "python workflow.py"
test = "pytest tests/ -v"

[dependencies]
python = ">=3.11"
numpy = ">=1.18.0"
pyyaml = ">=5.3"
pytest = ">=7.0"
pytest-cov = ">=4.0"
pytest-mock = ">=3.0"
openpyxl = ">=3.0"
requests = ">=2.20"

[pypi-dependencies]
pandas = ">=1.0.0"
pyam-iamc = ">=2.0.0"
nomenclature-iamc = ">=0.29"
pypsa-validation-processing = { path = ".", editable = true }

